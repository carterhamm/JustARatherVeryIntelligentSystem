name: JARVIS
options:
  bundleIdPrefix: dev.malibupoint
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  JARVIS:
    type: application
    platform: iOS
    sources:
      - path: JARVIS
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: JARVIS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.malibupoint.jarvis
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
    entitlements:
      path: JARVIS/JARVIS.entitlements

  JARVISWatch Watch App:
    type: application
    platform: watchOS
    sources:
      - path: JARVISWatch
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: JARVISWatch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.malibupoint.jarvis.watchkitapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
