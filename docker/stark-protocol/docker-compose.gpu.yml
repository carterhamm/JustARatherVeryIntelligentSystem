version: '3.8'

# ============================================================================
# Stark Protocol — GPU Server Configuration
# ============================================================================
# Deploy this on a machine with NVIDIA GPU(s).
# Runs vLLM with Gemma 3 models (1B for simple queries, 27B for complex).
#
# Requirements:
#   - NVIDIA GPU with >= 24GB VRAM (for 27B model)
#   - nvidia-container-toolkit installed
#   - Docker with GPU support enabled
#
# Usage:
#   docker compose -f docker-compose.gpu.yml up -d
# ============================================================================

services:
  vllm-gemma-27b:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command: >
      --model google/gemma-3-27b-it
      --served-model-name gemma-3-27b
      --dtype auto
      --max-model-len 8192
      --gpu-memory-utilization 0.85
      --port 8000
    ports:
      - "8080:8000"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  vllm-gemma-1b:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command: >
      --model google/gemma-3-1b-it
      --served-model-name gemma-3-1b
      --dtype auto
      --max-model-len 8192
      --gpu-memory-utilization 0.10
      --port 8000
    ports:
      - "8081:8000"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  shieldgemma:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command: >
      --model google/shieldgemma-2b
      --served-model-name shieldgemma-2b
      --dtype auto
      --max-model-len 2048
      --gpu-memory-utilization 0.05
      --port 8000
    ports:
      - "8082:8000"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Nginx reverse proxy to unify all models under a single endpoint
  stark-proxy:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx-stark.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - vllm-gemma-27b
      - vllm-gemma-1b
      - shieldgemma
    restart: unless-stopped

volumes:
  vllm_cache:
